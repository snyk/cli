              if ($LASTEXITCODE -ne 0) {
                continue
              }
              $Candidate = Get-Content $ManifestPath -Raw
              if ($Candidate -match "<Error>") {
                continue
              }
              if ($Candidate -notmatch "-----BEGIN PGP SIGNED MESSAGE-----") {
                continue
              }
              $ManifestRaw = $Candidate
              break
            }
            if (-not $ManifestRaw) {
