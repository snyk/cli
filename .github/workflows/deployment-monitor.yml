  compare_versions:
    name: 'Compare Snyk Versions'
    if: always()
    runs-on: ubuntu-latest
    needs:
      [
        monitor_cdn,
        monitor_cdn_retry,
        monitor_cdn_retry_2,
        monitor_homebrew,
        monitor_homebrew_retry,
        monitor_homebrew_retry_2,
        monitor_scoop,
        monitor_scoop_retry,
        monitor_scoop_retry_2,
        monitor_npm,
        monitor_npm_retry,
        monitor_npm_retry_2,
        monitor_snyk_images,
        monitor_snyk_images_retry,
        monitor_snyk_images_retry_2,
        verify_manifests,
        verify_experimental_manifest,
      ]
    steps:
      - name: Summarize job results
        env:
          MONITOR_CDN: ${{ needs.monitor_cdn.result }}
          MONITOR_CDN_RETRY: ${{ needs.monitor_cdn_retry.result }}
          MONITOR_CDN_RETRY_2: ${{ needs.monitor_cdn_retry_2.result }}
          MONITOR_HOMEBREW: ${{ needs.monitor_homebrew.result }}
          MONITOR_HOMEBREW_RETRY: ${{ needs.monitor_homebrew_retry.result }}
          MONITOR_HOMEBREW_RETRY_2: ${{ needs.monitor_homebrew_retry_2.result }}
          MONITOR_SCOOP: ${{ needs.monitor_scoop.result }}
          MONITOR_SCOOP_RETRY: ${{ needs.monitor_scoop_retry.result }}
          MONITOR_SCOOP_RETRY_2: ${{ needs.monitor_scoop_retry_2.result }}
          MONITOR_NPM: ${{ needs.monitor_npm.result }}
          MONITOR_NPM_RETRY: ${{ needs.monitor_npm_retry.result }}
          MONITOR_NPM_RETRY_2: ${{ needs.monitor_npm_retry_2.result }}
          MONITOR_SNYK_IMAGES: ${{ needs.monitor_snyk_images.result }}
          MONITOR_SNYK_IMAGES_RETRY: ${{ needs.monitor_snyk_images_retry.result }}
          MONITOR_SNYK_IMAGES_RETRY_2: ${{ needs.monitor_snyk_images_retry_2.result }}
          VERIFY_MANIFESTS: ${{ needs.verify_manifests.result }}
          VERIFY_EXPERIMENTAL: ${{ needs.verify_experimental_manifest.result }}
        run: |
          set -euo pipefail

          report_result() {
            local label="$1"
            local result="$2"
            case "$result" in
              success) echo "✅ ${label}: success" ;;
              failure) echo "❌ ${label}: failure" ;;
              cancelled) echo "⏭ ${label}: cancelled (runner/queue or workflow stop)" ;;
              skipped) echo "⏭ ${label}: skipped (upstream did not complete)" ;;
              *) echo "? ${label}: ${result}" ;;
            esac
          }

          attempts_succeeded() {
            local r1="$1"
            local r2="$2"
            local r3="$3"
            [ "$r1" = "success" ] || [ "$r2" = "success" ] || [ "$r3" = "success" ]
          }

          winning_attempt() {
            local r1="$1"
            local r2="$2"
            local r3="$3"
            if [ "$r1" = "success" ]; then
              echo "primary"
            elif [ "$r2" = "success" ]; then
              echo "retry 1"
            elif [ "$r3" = "success" ]; then
              echo "retry 2"
            else
              echo "none"
            fi
          }

          report_logical_monitor() {
            local label="$1"
            local r1="$2"
            local r2="$3"
            local r3="$4"
            echo "=== ${label} attempts ==="
            report_result "${label} (primary)" "$r1"
            report_result "${label} (retry 1)" "$r2"
            report_result "${label} (retry 2)" "$r3"
            if attempts_succeeded "$r1" "$r2" "$r3"; then
              echo "✅ ${label}: channel OK (succeeded on $(winning_attempt "$r1" "$r2" "$r3"))"
            elif [ "$r1" = "failure" ]; then
              echo "❌ ${label}: failure on primary attempt (no job retry for failure)."
            else
              echo "❌ ${label}: all attempts failed or cancelled without success."
            fi
          }

          logical_monitor_failed() {
            local r1="$1"
            local r2="$2"
            local r3="$3"
            if attempts_succeeded "$r1" "$r2" "$r3"; then
              return 1
            fi
            return 0
          }

          echo "=== Upstream monitor and verify job results ==="
          report_logical_monitor "monitor_cdn" "$MONITOR_CDN" "$MONITOR_CDN_RETRY" "$MONITOR_CDN_RETRY_2"
          report_logical_monitor "monitor_homebrew" "$MONITOR_HOMEBREW" "$MONITOR_HOMEBREW_RETRY" "$MONITOR_HOMEBREW_RETRY_2"
          report_logical_monitor "monitor_scoop" "$MONITOR_SCOOP" "$MONITOR_SCOOP_RETRY" "$MONITOR_SCOOP_RETRY_2"
          report_logical_monitor "monitor_npm" "$MONITOR_NPM" "$MONITOR_NPM_RETRY" "$MONITOR_NPM_RETRY_2"
          report_logical_monitor "monitor_snyk_images" "$MONITOR_SNYK_IMAGES" "$MONITOR_SNYK_IMAGES_RETRY" "$MONITOR_SNYK_IMAGES_RETRY_2"
          report_result "verify_manifests" "$VERIFY_MANIFESTS"
          report_result "verify_experimental_manifest" "$VERIFY_EXPERIMENTAL"

          upstream_failure=0
          if logical_monitor_failed "$MONITOR_CDN" "$MONITOR_CDN_RETRY" "$MONITOR_CDN_RETRY_2"; then
            upstream_failure=1
          fi
          if logical_monitor_failed "$MONITOR_HOMEBREW" "$MONITOR_HOMEBREW_RETRY" "$MONITOR_HOMEBREW_RETRY_2"; then
            upstream_failure=1
          fi
          if logical_monitor_failed "$MONITOR_SCOOP" "$MONITOR_SCOOP_RETRY" "$MONITOR_SCOOP_RETRY_2"; then
            upstream_failure=1
          fi
          if logical_monitor_failed "$MONITOR_NPM" "$MONITOR_NPM_RETRY" "$MONITOR_NPM_RETRY_2"; then
            upstream_failure=1
          fi
          if logical_monitor_failed "$MONITOR_SNYK_IMAGES" "$MONITOR_SNYK_IMAGES_RETRY" "$MONITOR_SNYK_IMAGES_RETRY_2"; then
            upstream_failure=1
          fi
          if [ "$VERIFY_MANIFESTS" = "failure" ]; then
            upstream_failure=1
            echo "❌ verify_manifests failed — channel unverified (strict mode)."
          fi
          if [ "$VERIFY_EXPERIMENTAL" = "failure" ]; then
            upstream_failure=1
            echo "❌ verify_experimental_manifest failed — channel unverified (strict mode)."
          fi

          if [ "$upstream_failure" -eq 1 ]; then
            echo "❌ One or more monitor/verify jobs failed. Continuing compare on available artifacts."
            exit 1
          fi

          echo "✅ All monitor channels verified (primary or retry success); verify jobs OK."
      - uses: actions/download-artifact@v4
        if: always()
        with:
          pattern: snyk-version-*
          merge-multiple: true
          path: ${{ env.SNYK_VERSION_DIR }}
      - name: Check if the directory is not empty
        if: always()
        run: |
          cd "${{ env.SNYK_VERSION_DIR }}"
          txt_files=$(ls *.txt 2>/dev/null)
          if [ -z "$txt_files" ]; then
            echo "❌ No .txt files found in ${{ env.SNYK_VERSION_DIR }}. Version comparison cannot proceed."
            exit 2
          fi
      - name: If not empty, compare Snyk versions
        if: always()
        run: |
          cd "${{ env.SNYK_VERSION_DIR }}"
          echo "Collected Snyk versions:"

          stable_versions=()
          preview_versions=()

          # First, sort the *.txt files containg versions numbers into a preview and stable array
          for file in *.txt; do
            job_name=$(basename "$file" .txt)
            version=$(cat "$file" | tr -d '\r\n')
            echo "$job_name: $version"

            # Fail fast if any of the files are empty
            if [ -z "$version" ]; then
              echo "❌ File $file is does not contain anything. All .txt files must contain a version number."
              exit 3
            fi

            # As long as we have at least one non-empty file, we can set all_empty to 0 and not fail on empty files
            all_empty=0

            # Fill the stable and preview arrays
            if [[ "$file" == *"-preview"* ]]; then
              preview_versions+=("$version")
            else
              stable_versions+=("$version")
            fi
          done

          # Check stable versions consistency
          found_diff_stable=0
          first_stable="${stable_versions[0]}"
          echo "Checking stable versions consistency..."
          for version in "${stable_versions[@]}"; do
            if [ "$version" != "$first_stable" ]; then
              found_diff_stable=1
              echo "  ❌ Found different stable version: $version (expected: $first_stable)"
            fi
          done

          # Check preview versions consistency
          found_diff_preview=0
          first_preview="${preview_versions[0]}"
          echo "Checking preview versions consistency..."
          for version in "${preview_versions[@]}"; do
            if [ "$version" != "$first_preview" ]; then
              found_diff_preview=1
              echo "  ❌ Found different preview version: $version (expected: $first_preview)"
            fi
          done

          if [ "$found_diff_stable" -eq 1 ] || [ "$found_diff_preview" -eq 1 ]; then
            echo "❌ Snyk versions are NOT consistent across jobs."
            exit 1
          fi

          echo "✅ All Snyk versions (stable and preview) are consistent within their respective channels."
      - name: Compare CDN shasums
        if: always()
        run: |
          cd "${{ env.SNYK_VERSION_DIR }}"
          python3 - <<'PY'
          import json
          import os
          from collections import defaultdict

          metadata_files = [f for f in os.listdir(".") if f.startswith("snyk-metadata-") and f.endswith(".json")]
          if not metadata_files:
              print("No metadata files found; skipping shasum comparison.")
              raise SystemExit(0)

          cdn_entries = defaultdict(list)
          for filename in metadata_files:
              with open(filename, "r", encoding="utf-8") as fh:
                  content = fh.read().strip()
              if not content:
                  print(f"Metadata file {filename} is empty.")
                  raise SystemExit(1)
              try:
                  data = json.loads(content)
              except json.JSONDecodeError as exc:
                  snippet = content[:200].replace("\n", "\\n")
                  print(f"Invalid JSON in {filename}: {exc}")
                  print(f"Content snippet: {snippet}")
                  raise SystemExit(1)
              base_url = data.get("base_url")
              if base_url not in {"static.snyk.io", "downloads.snyk.io"}:
                  continue
              channel = data.get("channel", "unknown")
              binary = data.get("binary", "unknown")
              sha256 = data.get("sha256")
              if sha256:
                  cdn_entries[(channel, binary)].append((base_url, sha256, filename))

          if not cdn_entries:
              print("No CDN metadata entries found; skipping shasum comparison.")
              raise SystemExit(0)

          failed = False
          for (channel, binary), entries in sorted(cdn_entries.items()):
              shas = {sha for _, sha, _ in entries}
              if len(shas) > 1:
                  failed = True
                  print(f"❌ CDN shasum mismatch for {binary} ({channel})")
                  for base_url, sha, fname in entries:
                      print(f"  {base_url}: {sha} ({fname})")
          if failed:
              raise SystemExit(1)

          print("✅ CDN shasums are consistent within channels.")
          PY

  verify_manifests:
    name: 'Verify shasum manifests (stable/preview)'
    runs-on: ubuntu-latest
    steps:
      - name: Install GPG
        run: sudo apt-get update && sudo apt-get install -y gnupg
      - name: Import Snyk CLI public key
        run: |
          curl --retry 2 -sSL https://raw.githubusercontent.com/snyk/cli/main/help/_about-this-project/snyk-code-signing-public.pgp -o public.pgp
          gpg --import public.pgp
      - name: Verify stable manifest
        run: |
          curl --retry 2 -sSL https://downloads.snyk.io/cli/stable/sha256sums.txt.asc -o sha256sums-stable.txt.asc
          gpg --verify sha256sums-stable.txt.asc
      - name: Verify preview manifest
        run: |
          curl --retry 2 -sSL https://downloads.snyk.io/cli/preview/sha256sums.txt.asc -o sha256sums-preview.txt.asc
          gpg --verify sha256sums-preview.txt.asc

  verify_experimental_manifest:
    name: 'Verify shasum manifest (experimental)'
    runs-on: ubuntu-latest
    container:
      image: snyk/snyk:linux
    steps:
      - name: Install GPG
        run: apt-get update && apt-get install -y gnupg curl
      - name: Import Snyk CLI public key
        run: |
          curl --retry 2 -sSL https://raw.githubusercontent.com/snyk/cli/main/help/_about-this-project/snyk-code-signing-public.pgp -o public.pgp
          gpg --import public.pgp
      - name: Verify experimental manifest
        run: |
          VERSION=$(snyk --version | tr -d '\r\n')
          curl --retry 2 -sSL "https://downloads.snyk.io/experimental/cli/v${VERSION}/sha256sums.txt.asc" -o sha256sums-experimental.txt.asc
          gpg --verify sha256sums-experimental.txt.asc

  notify_slack_on_failure:
    if: ${{ always() && failure() && github.ref == 'refs/heads/main' }}
    name: 'Do a Slack notification on failure'
    needs:
      - create_version_dir
      - create_version_dir_retry
      - create_version_dir_retry_2
      - monitor_cdn
      - monitor_cdn_retry
      - monitor_cdn_retry_2
      - monitor_homebrew
      - monitor_homebrew_retry
      - monitor_homebrew_retry_2
      - monitor_scoop
      - monitor_scoop_retry
      - monitor_scoop_retry_2
      - monitor_npm
      - monitor_npm_retry
      - monitor_npm_retry_2
      - monitor_snyk_images
      - monitor_snyk_images_retry
      - monitor_snyk_images_retry_2
      - verify_manifests
      - verify_experimental_manifest
      - compare_versions
    runs-on: ubuntu-latest
    steps:
      - name: Build failure summary
        id: summary
        env:
          CREATE_VERSION_DIR: ${{ needs.create_version_dir.result }}
          CREATE_VERSION_DIR_RETRY: ${{ needs.create_version_dir_retry.result }}
          CREATE_VERSION_DIR_RETRY_2: ${{ needs.create_version_dir_retry_2.result }}
          MONITOR_CDN: ${{ needs.monitor_cdn.result }}
          MONITOR_CDN_RETRY: ${{ needs.monitor_cdn_retry.result }}
          MONITOR_CDN_RETRY_2: ${{ needs.monitor_cdn_retry_2.result }}
          MONITOR_HOMEBREW: ${{ needs.monitor_homebrew.result }}
          MONITOR_HOMEBREW_RETRY: ${{ needs.monitor_homebrew_retry.result }}
          MONITOR_HOMEBREW_RETRY_2: ${{ needs.monitor_homebrew_retry_2.result }}
          MONITOR_SCOOP: ${{ needs.monitor_scoop.result }}
          MONITOR_SCOOP_RETRY: ${{ needs.monitor_scoop_retry.result }}
          MONITOR_SCOOP_RETRY_2: ${{ needs.monitor_scoop_retry_2.result }}
          MONITOR_NPM: ${{ needs.monitor_npm.result }}
          MONITOR_NPM_RETRY: ${{ needs.monitor_npm_retry.result }}
          MONITOR_NPM_RETRY_2: ${{ needs.monitor_npm_retry_2.result }}
          MONITOR_SNYK_IMAGES: ${{ needs.monitor_snyk_images.result }}
          MONITOR_SNYK_IMAGES_RETRY: ${{ needs.monitor_snyk_images_retry.result }}
          MONITOR_SNYK_IMAGES_RETRY_2: ${{ needs.monitor_snyk_images_retry_2.result }}
          VERIFY_MANIFESTS: ${{ needs.verify_manifests.result }}
          VERIFY_EXPERIMENTAL: ${{ needs.verify_experimental_manifest.result }}
          COMPARE_VERSIONS: ${{ needs.compare_versions.result }}
        run: |
          set -euo pipefail

          attempts_succeeded() {
            local r1="$1"
            local r2="$2"
            local r3="$3"
            [ "$r1" = "success" ] || [ "$r2" = "success" ] || [ "$r3" = "success" ]
          }

          classify_failure() {
            local job_id="$1"
            local result="$2"
            if [ "$result" = "cancelled" ]; then
              echo "infra"
              return
            fi
            if [ "$result" != "failure" ]; then
              echo ""
              return
            fi
            case "$job_id" in
              create_version_dir)
                echo "infra"
                ;;
              compare_versions|verify_manifests|verify_experimental_manifest)
                echo "detection"
                ;;
              monitor_*)
                echo "detection"
                ;;
              *)
                echo "detection"
                ;;
            esac
          }

          failure_context() {
            local job_id="$1"
            local result="$2"
            if [ "$result" = "cancelled" ]; then
              echo "cancelled (possible runner not acquired)"
              return
            fi
            case "$job_id" in
              compare_versions)
                echo "version or CDN shasum mismatch"
                ;;
              verify_manifests|verify_experimental_manifest)
                echo "GPG manifest verification failed"
                ;;
              monitor_cdn|monitor_homebrew|monitor_scoop|monitor_npm|monitor_snyk_images)
                echo "install, download, or hash assertion failed"
                ;;
              create_version_dir)
                echo "bootstrap step failed or cancelled"
                ;;
              *)
                echo "job failed"
                ;;
            esac
          }

          append_failed_job() {
            local job_id="$1"
            local display_name="$2"
            local result="$3"
            if [ "$result" != "failure" ] && [ "$result" != "cancelled" ]; then
              return
            fi
            local label
            label="$(classify_failure "$job_id" "$result")"
            local context
            context="$(failure_context "$job_id" "$result")"
            if [ -n "$SUMMARY" ]; then
              SUMMARY="${SUMMARY}"$'\n'
            fi
            SUMMARY="${SUMMARY}• ${display_name} — ${context} [${label}]"
          }

          append_logical_failure() {
            local job_id="$1"
            local display_name="$2"
            local r1="$3"
            local r2="$4"
            local r3="$5"
            if attempts_succeeded "$r1" "$r2" "$r3"; then
              return
            fi
            local context
            local label
            if [ "$r1" = "failure" ]; then
              context="failure on primary attempt (no job retry for failure)"
              label="detection"
            elif [ "$r1" = "cancelled" ] || [ "$r2" = "cancelled" ] || [ "$r3" = "cancelled" ]; then
              context="cancelled after 3 attempts (runner not acquired)"
              label="infra"
            else
              context="all attempts failed or cancelled without success"
              label="infra"
            fi
            if [ -n "$SUMMARY" ]; then
              SUMMARY="${SUMMARY}"$'\n'
            fi
            SUMMARY="${SUMMARY}• ${display_name} — ${context} [${label}]"
          }

          SUMMARY=""
          append_logical_failure "create_version_dir" "Create version directory" "$CREATE_VERSION_DIR" "$CREATE_VERSION_DIR_RETRY" "$CREATE_VERSION_DIR_RETRY_2"
          append_logical_failure "monitor_cdn" "deployment: CDN" "$MONITOR_CDN" "$MONITOR_CDN_RETRY" "$MONITOR_CDN_RETRY_2"
          append_logical_failure "monitor_homebrew" "deployment: Homebrew (macos)" "$MONITOR_HOMEBREW" "$MONITOR_HOMEBREW_RETRY" "$MONITOR_HOMEBREW_RETRY_2"
          append_logical_failure "monitor_scoop" "deployment: Scoop (windows)" "$MONITOR_SCOOP" "$MONITOR_SCOOP_RETRY" "$MONITOR_SCOOP_RETRY_2"
          append_logical_failure "monitor_npm" "deployment: npm (ubuntu)" "$MONITOR_NPM" "$MONITOR_NPM_RETRY" "$MONITOR_NPM_RETRY_2"
          append_logical_failure "monitor_snyk_images" "deployment: snyk-images (snyk/snyk:linux)" "$MONITOR_SNYK_IMAGES" "$MONITOR_SNYK_IMAGES_RETRY" "$MONITOR_SNYK_IMAGES_RETRY_2"
          append_failed_job "verify_manifests" "Verify shasum manifests (stable/preview)" "$VERIFY_MANIFESTS"
          append_failed_job "verify_experimental_manifest" "Verify shasum manifest (experimental)" "$VERIFY_EXPERIMENTAL"
          append_failed_job "compare_versions" "Compare Snyk Versions" "$COMPARE_VERSIONS"

          if [ -z "$SUMMARY" ]; then
            SUMMARY="• Workflow failed but no individual job reported failure or cancellation."
          fi

          {
            echo "failed_jobs_summary<<EOF"
            echo "*Failed jobs:*"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Post a message in a channel
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CLI_ALERTS_CHANNEL_ID }}
            text: ":red_circle: *Deployment Monitor Failed!*"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: ":red_circle: Deployment Monitor Failed!"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Workflow*: `${{ github.workflow }}`"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ steps.summary.outputs.failed_jobs_summary }}"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: ":link: *View run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open in GitHub Actions>"
              - type: "divider"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: ":warning: Please investigate the failure. This message was generated automatically."
