name: Deployment Tests

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deployment-monitor.yml'
  schedule:
    # At minute 0 past every 2nd hour
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  SNYK_VERSION_DIR: snyk-versions-${{ github.run_id }}

jobs:
  create_version_dir:
    name: 'Create version directory'
    runs-on: ubuntu-latest
    steps:
      - name: Create version directory for version comparison
        run: |
          mkdir -p $SNYK_VERSION_DIR
          echo "Created directory for Snyk versions."
          touch ${{ env.SNYK_VERSION_DIR }}/.keep
      - uses: actions/upload-artifact@v4
        with:
          name: snyk-version-${{ github.job }}
          path: ${{ env.SNYK_VERSION_DIR }}
          include-hidden-files: 'true'

  create_version_dir_retry:
    name: 'Create version directory [retry 1/2]'
    runs-on: ubuntu-latest
    needs: create_version_dir
    if: ${{ github.ref == 'refs/heads/main' && needs.create_version_dir.result == 'cancelled' }}
    steps:
      - name: Create version directory for version comparison
        run: |
          mkdir -p $SNYK_VERSION_DIR
          echo "Created directory for Snyk versions."
          touch ${{ env.SNYK_VERSION_DIR }}/.keep
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: snyk-version-create_version_dir
          path: ${{ env.SNYK_VERSION_DIR }}
          include-hidden-files: 'true'

  create_version_dir_retry_2:
    name: 'Create version directory [retry 2/2]'
    runs-on: ubuntu-latest
    needs: create_version_dir_retry
    if: ${{ github.ref == 'refs/heads/main' && needs.create_version_dir_retry.result == 'cancelled' }}
    steps:
      - name: Create version directory for version comparison
        run: |
          mkdir -p $SNYK_VERSION_DIR
          echo "Created directory for Snyk versions."
          touch ${{ env.SNYK_VERSION_DIR }}/.keep
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: snyk-version-create_version_dir
          path: ${{ env.SNYK_VERSION_DIR }}
          include-hidden-files: 'true'

  monitor_cdn:
    name: 'deployment: CDN'
    runs-on: ${{ matrix.os }}-latest
    needs:
      - create_version_dir
      - create_version_dir_retry
      - create_version_dir_retry_2
    if: ${{ always() && (needs.create_version_dir.result == 'success' || needs.create_version_dir_retry.result == 'success' || needs.create_version_dir_retry_2.result == 'success') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        base_url: [static.snyk.io, downloads.snyk.io]
        channel: [stable, preview]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y curl
      - uses: actions/download-artifact@v4
        with:
          path: ${{ env.SNYK_VERSION_DIR }}
      - name: Download Snyk binary
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            rm -f ./snyk ./snyk-linux ./snyk-linux.sha256
            curl --retry 2 -L -v --compressed https://${{ matrix.base_url }}/cli/${{ matrix.channel }}/snyk-linux -o ./snyk-linux
            curl --retry 2 -L -v --compressed https://${{ matrix.base_url }}/cli/${{ matrix.channel }}/snyk-linux.sha256 -o ./snyk-linux.sha256
            chmod +x ./snyk-linux
      - name: Download Snyk binary
        if: github.ref != 'refs/heads/main'
        run: |
          rm -f ./snyk ./snyk-linux ./snyk-linux.sha256
          curl --retry 2 -L -v --compressed https://${{ matrix.base_url }}/cli/${{ matrix.channel }}/snyk-linux -o ./snyk-linux
          curl --retry 2 -L -v --compressed https://${{ matrix.base_url }}/cli/${{ matrix.channel }}/snyk-linux.sha256 -o ./snyk-linux.sha256
          chmod +x ./snyk-linux
      - name: Verify Snyk binary hash
        run: |
          echo --- Content shasum file ---
          cat snyk-linux.sha256
          echo --- Shasum binary ---
          sha256sum snyk-linux
          echo --- CLI version ---
          ./snyk-linux --version
          echo --- Shasum comparison ---
          sha256sum -c snyk-linux.sha256
      - name: Set unique identifier for the artifact file name
        run: echo "SUFFIX=${{ matrix.os }}-${{ matrix.base_url }}-${{ matrix.channel }}" >> $GITHUB_ENV
      - name: Capture version and shasum metadata
        run: |
          VERSION=$(./snyk-linux --version | tr -d '\r\n')
          SHA256=$(sha256sum snyk-linux | awk '{print $1}')
          echo "$VERSION" > ${{ env.SNYK_VERSION_DIR }}/snyk-version-${{ env.SUFFIX }}.txt
          cat <<EOF > ${{ env.SNYK_VERSION_DIR }}/snyk-metadata-${{ env.SUFFIX }}.json
          {"channel":"${{ matrix.channel }}","base_url":"${{ matrix.base_url }}","binary":"snyk-linux","version":"$VERSION","sha256":"$SHA256"}
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: snyk-version-${{ env.SUFFIX }}
          path: |
            ${{ env.SNYK_VERSION_DIR }}/snyk-version-${{ env.SUFFIX }}.txt
            ${{ env.SNYK_VERSION_DIR }}/snyk-metadata-${{ env.SUFFIX }}.json

  monitor_homebrew:
    name: 'deployment: Homebrew (macos)'
    runs-on: macos-latest
    needs:
      - create_version_dir
      - create_version_dir_retry
      - create_version_dir_retry_2
    if: ${{ always() && (needs.create_version_dir.result == 'success' || needs.create_version_dir_retry.result == 'success' || needs.create_version_dir_retry_2.result == 'success') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ env.SNYK_VERSION_DIR }}
      - name: Install Snyk
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            brew tap snyk/tap
            brew install snyk
      - name: Install Snyk
        if: github.ref != 'refs/heads/main'
        run: |
          brew tap snyk/tap
          brew install snyk
      - name: Resolve installed Snyk metadata
        run: |
          VERSION=$(snyk --version | tr -d '\r\n')
          SNYK_PATH=$(command -v snyk)
          SHA256=$(shasum -a 256 "$SNYK_PATH" | awk '{print $1}')
          FILE_INFO=$(file "$SNYK_PATH")
          if echo "$FILE_INFO" | grep -qi "arm64"; then
            BINARY_NAME="snyk-macos-arm64"
          elif echo "$FILE_INFO" | grep -qi "x86_64"; then
            BINARY_NAME="snyk-macos"
          else
            ARCH=$(uname -m)
            if [ "$ARCH" = "arm64" ]; then
              BINARY_NAME="snyk-macos-arm64"
            else
              BINARY_NAME="snyk-macos"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV
          echo "RELEASE_URL=https://static.snyk.io/cli/v${VERSION}/release.json" >> $GITHUB_ENV
      - name: Download release.json
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: curl --retry 2 -sSL "$RELEASE_URL" -o release.json
        env:
          RELEASE_URL: ${{ env.RELEASE_URL }}
      - name: Download release.json
        if: github.ref != 'refs/heads/main'
        run: curl --retry 2 -sSL "$RELEASE_URL" -o release.json
        env:
          RELEASE_URL: ${{ env.RELEASE_URL }}
      - name: Assert hash and write artifacts
        run: |
          EXPECTED=$(BINARY_NAME="$BINARY_NAME" python3 - <<'PY'
          import json
          import os
          name = os.environ.get("BINARY_NAME")
          if not name:
              raise SystemExit(1)
          with open("release.json", "r", encoding="utf-8") as fh:
              data = json.load(fh)
          asset = data.get("assets", {}).get(name)
          if not asset or "sha256" not in asset:
              raise SystemExit(1)
          print(asset["sha256"].split()[0])
          PY
          )
          if [ -z "$EXPECTED" ]; then
            echo "Missing expected hash for $BINARY_NAME in release.json."
            exit 1
          fi
          if [ "$SHA256" != "$EXPECTED" ]; then
            echo "Hash mismatch for $BINARY_NAME (homebrew)."
            echo "Expected: $EXPECTED"
            echo "Actual:   $SHA256"
            exit 1
          fi
          echo "$VERSION" > ${{ env.SNYK_VERSION_DIR }}/snyk-version-${{ github.job }}.txt
          cat <<EOF > ${{ env.SNYK_VERSION_DIR }}/snyk-metadata-${{ github.job }}.json
          {"channel":"stable","base_url":"homebrew","binary":"$BINARY_NAME","version":"$VERSION","sha256":"$SHA256"}
          EOF
        env:
          VERSION: ${{ env.VERSION }}
          SHA256: ${{ env.SHA256 }}
          BINARY_NAME: ${{ env.BINARY_NAME }}
      - uses: actions/upload-artifact@v4
        with:
          name: snyk-version-${{ github.job }}
          path: |
            ${{ env.SNYK_VERSION_DIR }}/snyk-version-${{ github.job }}.txt
            ${{ env.SNYK_VERSION_DIR }}/snyk-metadata-${{ github.job }}.json

  monitor_scoop:
    name: 'deployment: Scoop (windows)'
    runs-on: windows-latest
    needs:
      - create_version_dir
      - create_version_dir_retry
      - create_version_dir_retry_2
    if: ${{ always() && (needs.create_version_dir.result == 'success' || needs.create_version_dir_retry.result == 'success' || needs.create_version_dir_retry_2.result == 'success') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ env.SNYK_VERSION_DIR }}
      - name: Install Scoop and Snyk
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: pwsh
          command: |
            Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
            Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
            scoop bucket add snyk https://github.com/snyk/scoop-snyk
            scoop install snyk
      - name: Install Scoop and Snyk
        if: github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          scoop bucket add snyk https://github.com/snyk/scoop-snyk
          scoop install snyk
      - name: Resolve installed Snyk metadata
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\scoop\shims;$env:PATH"
          $Version = (snyk --version).Trim()
          $Candidates = @()
          if (Get-Command scoop -ErrorAction SilentlyContinue) {
            $SnykPrefix = (scoop prefix snyk 2>$null)
            if ($SnykPrefix) {
              $Candidates += (Join-Path $SnykPrefix "snyk-win.exe")
            }
          }
          $Candidates += "$env:USERPROFILE\scoop\apps\snyk\current\snyk-win.exe"
          $Cmd = (Get-Command snyk.exe -ErrorAction SilentlyContinue)
          if ($Cmd) {
            $Candidates += $Cmd.Source
          }
          $SnykPath = $Candidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $SnykPath) {
            throw "Unable to resolve Snyk binary path for Scoop."
          }
          $Sha256 = (Get-FileHash -Algorithm SHA256 $SnykPath).Hash.ToLower()
          "VERSION=$Version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii
          "SHA256=$Sha256" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii
      - name: Download sha256sums manifest
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: pwsh
          command: |
            $ManifestPath = "sha256sums-stable.txt.asc"
            $ManifestUrls = @(
              "https://static.snyk.io/cli/stable/sha256sums.txt.asc",
              "https://downloads.snyk.io/cli/stable/sha256sums.txt.asc"
            )
            $ManifestRaw = $null
            foreach ($ManifestUrl in $ManifestUrls) {
              & curl.exe --retry 2 -fsSL $ManifestUrl -o $ManifestPath
              if ($LASTEXITCODE -ne 0) {
                continue
              }
              $Candidate = Get-Content $ManifestPath -Raw
              if ($Candidate -match "<Error>") {
                continue
              }
              if ($Candidate -notmatch "-----BEGIN PGP SIGNED MESSAGE-----") {
                continue
              }
              $ManifestRaw = $Candidate
              break
            }
            if (-not $ManifestRaw) {
              throw "Failed to download a valid sha256sums.txt.asc manifest for stable channel."
            }
            Set-Content -Path manifest.raw.txt -Value $ManifestRaw -NoNewline
      - name: Download sha256sums manifest
        if: github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          $ManifestPath = "sha256sums-stable.txt.asc"
          $ManifestUrls = @(
            "https://static.snyk.io/cli/stable/sha256sums.txt.asc",
            "https://downloads.snyk.io/cli/stable/sha256sums.txt.asc"
          )
          $ManifestRaw = $null
          foreach ($ManifestUrl in $ManifestUrls) {
            & curl.exe --retry 2 -fsSL $ManifestUrl -o $ManifestPath
            if ($LASTEXITCODE -ne 0) {
              continue
            }
            $Candidate = Get-Content $ManifestPath -Raw
            if ($Candidate -match "<Error>") {
              continue
            }
            if ($Candidate -notmatch "-----BEGIN PGP SIGNED MESSAGE-----") {
              continue
            }
            $ManifestRaw = $Candidate
            break
          }
          if (-not $ManifestRaw) {
            throw "Failed to download a valid sha256sums.txt.asc manifest for stable channel."
          }
          Set-Content -Path manifest.raw.txt -Value $ManifestRaw -NoNewline
      - name: Assert hash and write artifacts
        shell: pwsh
        run: |
          $Version = $env:VERSION
          $Sha256 = $env:SHA256
          $BinaryName = "snyk-win.exe"
          $ManifestRaw = Get-Content manifest.raw.txt -Raw
          $Expected = $null
          foreach ($Line in ($ManifestRaw -split "\r?\n")) {
            $Line = $Line.Trim()
            if ($Line -match '^([0-9a-fA-F]{64})\s+\*?snyk-win\.exe$') {
              $Expected = $Matches[1].ToLower()
              break
            }
          }
          if (-not $Expected) {
            throw "Missing expected hash for snyk-win.exe in manifest."
          }
          if ($Sha256 -ne $Expected) {
            throw "Hash mismatch for snyk-win.exe (scoop). Expected $Expected, got $Sha256."
          }
          $Version | Out-File -FilePath "${{ env.SNYK_VERSION_DIR }}/snyk-version-${{ github.job }}.txt" -Encoding ascii
          @{
            channel = "stable"
            base_url = "scoop"
            binary = $BinaryName
            version = $Version
            sha256 = $Sha256
          } | ConvertTo-Json -Compress | Out-File -FilePath "${{ env.SNYK_VERSION_DIR }}/snyk-metadata-${{ github.job }}.json" -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: snyk-version-${{ github.job }}
          path: |
            ${{ env.SNYK_VERSION_DIR }}/snyk-version-${{ github.job }}.txt
            ${{ env.SNYK_VERSION_DIR }}/snyk-metadata-${{ github.job }}.json

  monitor_npm:
    name: 'deployment: npm (ubuntu)'
    runs-on: ubuntu-latest
    needs:
      - create_version_dir
      - create_version_dir_retry
      - create_version_dir_retry_2
    if: ${{ always() && (needs.create_version_dir.result == 'success' || needs.create_version_dir_retry.result == 'success' || needs.create_version_dir_retry_2.result == 'success') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ env.SNYK_VERSION_DIR }}
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Install Snyk
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm install -g snyk
      - name: Install Snyk
        if: github.ref != 'refs/heads/main'
        run: npm install -g snyk
      - name: Resolve installed Snyk metadata
        run: |
          VERSION=$(snyk --version | tr -d '\r\n')
          SNYK_PATH=$(command -v snyk)
          SHA256=$(shasum -a 256 "$SNYK_PATH" | awk '{print $1}')
          IS_ELF=$(python3 - "$SNYK_PATH" <<'PY'
          import sys
          with open(sys.argv[1], "rb") as fh:
              magic = fh.read(4)
          print("1" if magic == b"\x7fELF" else "0")
          PY
          )
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ] || [ "$ARCH" = "aarch64" ]; then
            BINARY_NAME="snyk-linux-arm64"
          else
            BINARY_NAME="snyk-linux"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "IS_ELF=$IS_ELF" >> $GITHUB_ENV
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV
      - name: Download sha256sums manifest
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            for url in \
              https://static.snyk.io/cli/stable/sha256sums.txt.asc \
              https://downloads.snyk.io/cli/stable/sha256sums.txt.asc; do
              curl --retry 2 -fsSL "$url" -o sha256sums.txt.asc
              if [ -s sha256sums.txt.asc ] && ! grep -q '<Error>' sha256sums.txt.asc; then
                break
              fi
            done
            if [ ! -s sha256sums.txt.asc ] || grep -q '<Error>' sha256sums.txt.asc; then
              echo "Failed to download a valid sha256sums.txt.asc manifest."
              exit 1
            fi
      - name: Download sha256sums manifest
        if: github.ref != 'refs/heads/main'
        run: |
          for url in \
            https://static.snyk.io/cli/stable/sha256sums.txt.asc \
            https://downloads.snyk.io/cli/stable/sha256sums.txt.asc; do
            curl --retry 2 -fsSL "$url" -o sha256sums.txt.asc
            if [ -s sha256sums.txt.asc ] && ! grep -q '<Error>' sha256sums.txt.asc; then
              break
            fi
          done
          if [ ! -s sha256sums.txt.asc ] || grep -q '<Error>' sha256sums.txt.asc; then
            echo "Failed to download a valid sha256sums.txt.asc manifest."
            exit 1
          fi
      - name: Assert hash and write artifacts
        run: |
          EXPECTED=$(awk -v name="$BINARY_NAME" '$1 ~ /^[a-f0-9]{64}$/ {gsub(/^\*/, "", $2); if ($2==name) {print $1; exit}}' sha256sums.txt.asc)
          if [ -z "$EXPECTED" ]; then
            echo "Missing expected hash for $BINARY_NAME in manifest."
            exit 1
          fi
          if [ "$IS_ELF" != "1" ]; then
            echo "Non-binary CLI detected for npm; skipping CDN hash comparison."
          elif [ "$SHA256" != "$EXPECTED" ]; then
            echo "Hash mismatch for $BINARY_NAME (npm)."
            echo "Expected: $EXPECTED"
            echo "Actual:   $SHA256"
            exit 1
          fi
          echo "$VERSION" > ${{ env.SNYK_VERSION_DIR }}/snyk-version-${{ github.job }}.txt
          cat <<EOF > ${{ env.SNYK_VERSION_DIR }}/snyk-metadata-${{ github.job }}.json
          {"channel":"stable","base_url":"npm","binary":"$BINARY_NAME","version":"$VERSION","sha256":"$SHA256"}
          EOF
        env:
          VERSION: ${{ env.VERSION }}
          SHA256: ${{ env.SHA256 }}
          IS_ELF: ${{ env.IS_ELF }}
          BINARY_NAME: ${{ env.BINARY_NAME }}
      - uses: actions/upload-artifact@v4
        with:
          name: snyk-version-${{ github.job }}
          path: |
            ${{ env.SNYK_VERSION_DIR }}/snyk-version-${{ github.job }}.txt
            ${{ env.SNYK_VERSION_DIR }}/snyk-metadata-${{ github.job }}.json

  monitor_snyk_images:
    name: 'deployment: snyk-images (snyk/snyk:linux)'
    runs-on: ubuntu-latest
    needs:
      - create_version_dir
      - create_version_dir_retry
      - create_version_dir_retry_2
    if: ${{ always() && (needs.create_version_dir.result == 'success' || needs.create_version_dir_retry.result == 'success' || needs.create_version_dir_retry_2.result == 'success') }}
    container:
      image: snyk/snyk:linux
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ env.SNYK_VERSION_DIR }}
      - name: Install curl
        run: apt-get update && apt-get install -y curl
      - name: Resolve installed Snyk metadata
        run: |
          VERSION=$(snyk --version | tr -d '\r\n')
          SNYK_PATH=$(command -v snyk)
          SHA256=$(shasum -a 256 "$SNYK_PATH" | awk '{print $1}')
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ] || [ "$ARCH" = "aarch64" ]; then
            BINARY_NAME="snyk-linux-arm64"
          else
            BINARY_NAME="snyk-linux"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV
      - name: Download experimental manifest
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            # The image is built by snyk/snyk-images using the experimental base URL.
            curl --retry 2 -sSL "https://downloads.snyk.io/experimental/cli/v${VERSION}/sha256sums.txt.asc" -o sha256sums.txt.asc
        env:
          VERSION: ${{ env.VERSION }}
      - name: Download experimental manifest
        if: github.ref != 'refs/heads/main'
        run: |
          # The image is built by snyk/snyk-images using the experimental base URL.
          curl --retry 2 -sSL "https://downloads.snyk.io/experimental/cli/v${VERSION}/sha256sums.txt.asc" -o sha256sums.txt.asc
        env:
          VERSION: ${{ env.VERSION }}
      - name: Assert hash and write artifacts
        run: |
          EXPECTED=$(awk -v name="$BINARY_NAME" '$1 ~ /^[a-f0-9]{64}$/ {gsub(/^\*/, "", $2); if ($2==name) {print $1; exit}}' sha256sums.txt.asc)
          if [ -z "$EXPECTED" ]; then
            echo "Missing expected hash for $BINARY_NAME in experimental manifest."
            exit 1
          fi
          if [ "$SHA256" != "$EXPECTED" ]; then
            echo "Hash mismatch for $BINARY_NAME (snyk-images)."
            echo "Expected: $EXPECTED"
            echo "Actual:   $SHA256"
            exit 1
          fi
          echo "$VERSION" > ${{ env.SNYK_VERSION_DIR }}/snyk-version-${{ github.job }}.txt
          cat <<EOF > ${{ env.SNYK_VERSION_DIR }}/snyk-metadata-${{ github.job }}.json
          {"channel":"stable","base_url":"snyk-images","binary":"$BINARY_NAME","version":"$VERSION","sha256":"$SHA256"}
          EOF
        env:
          VERSION: ${{ env.VERSION }}
          SHA256: ${{ env.SHA256 }}
          BINARY_NAME: ${{ env.BINARY_NAME }}
      - uses: actions/upload-artifact@v4
        with:
