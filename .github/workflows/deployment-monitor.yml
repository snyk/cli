        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: pwsh
          command: |
            $ManifestPath = "sha256sums-stable.txt.asc"
            $ManifestUrls = @(
              "https://static.snyk.io/cli/stable/sha256sums.txt.asc",
              "https://downloads.snyk.io/cli/stable/sha256sums.txt.asc"
            )
            $ManifestRaw = $null
            foreach ($ManifestUrl in $ManifestUrls) {
              & curl.exe --retry 2 -fsSL $ManifestUrl -o $ManifestPath
              if ($LASTEXITCODE -ne 0) {
                continue
              }
              $Candidate = Get-Content $ManifestPath -Raw
              if ($Candidate -match "<Error>") {
                continue
              }
              if ($Candidate -notmatch "-----BEGIN PGP SIGNED MESSAGE-----") {
                continue
              }
              $ManifestRaw = $Candidate
              break
            }
            if (-not $ManifestRaw) {
              throw "Failed to download a valid sha256sums.txt.asc manifest for stable channel."
            }
            Set-Content -Path manifest.raw.txt -Value $ManifestRaw -NoNewline
      - name: Download sha256sums manifest
        if: github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          $ManifestPath = "sha256sums-stable.txt.asc"
          $ManifestUrls = @(
            "https://static.snyk.io/cli/stable/sha256sums.txt.asc",
            "https://downloads.snyk.io/cli/stable/sha256sums.txt.asc"
          )
          $ManifestRaw = $null
          foreach ($ManifestUrl in $ManifestUrls) {
            & curl.exe --retry 2 -fsSL $ManifestUrl -o $ManifestPath
            if ($LASTEXITCODE -ne 0) {
              continue
            }
            $Candidate = Get-Content $ManifestPath -Raw
            if ($Candidate -match "<Error>") {
              continue
            }
            if ($Candidate -notmatch "-----BEGIN PGP SIGNED MESSAGE-----") {
              continue
            }
            $ManifestRaw = $Candidate
            break
          }
          if (-not $ManifestRaw) {
            throw "Failed to download a valid sha256sums.txt.asc manifest for stable channel."
          }
          Set-Content -Path manifest.raw.txt -Value $ManifestRaw -NoNewline
      - name: Assert hash and write artifacts
        shell: pwsh
        run: |
          $Version = $env:VERSION
          $Sha256 = $env:SHA256
          $BinaryName = "snyk-win.exe"
          $ManifestRaw = Get-Content manifest.raw.txt -Raw
          $Expected = $null
          foreach ($Line in ($ManifestRaw -split "\r?\n")) {
            $Line = $Line.Trim()
            if ($Line -match '^([0-9a-fA-F]{64})\s+\*?snyk-win\.exe$') {
              $Expected = $Matches[1].ToLower()
              break
            }
          }
          if (-not $Expected) {
            throw "Missing expected hash for snyk-win.exe in manifest."
          }
          if ($Sha256 -ne $Expected) {
            throw "Hash mismatch for snyk-win.exe (scoop). Expected $Expected, got $Sha256."
          }
          $Version | Out-File -FilePath "${{ env.SNYK_VERSION_DIR }}/snyk-version-monitor_scoop.txt" -Encoding ascii
          @{
            channel = "stable"
            base_url = "scoop"
            binary = $BinaryName
            version = $Version
            sha256 = $Sha256
          } | ConvertTo-Json -Compress | Out-File -FilePath "${{ env.SNYK_VERSION_DIR }}/snyk-metadata-monitor_scoop.json" -Encoding ascii
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: snyk-version-monitor_scoop
          path: |
